name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main
  workflow_dispatch: # Allows manual run

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false

      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }} # Used for PR comments
          action: "upload"
          
          ###### Configuration ######
          app_location: "/"               # Since it's a separate repo, code is at the root
          api_location: ""                # Leave blank unless using Azure Functions
          output_location: "dist"         # Change to 'build' if using Create-React-App
          
          ###### Environment Variables (Backend URLs) ######
          # This injects your backend service URLs into the frontend build
          app_build_command: |
            npm install
            VITE_USER_SERVICE_URL=${{ secrets.USER_SERVICE_URL }} \
            VITE_PRODUCT_SERVICE_URL=${{ secrets.PRODUCT_SERVICE_URL }} \
            VITE_PAYMENT_SERVICE_URL=${{ secrets.PAYMENT_SERVICE_URL }} \
            VITE_ORDER_SERVICE_URL=${{ secrets.ORDER_SERVICE_URL }} \
            npm run build

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: "close"